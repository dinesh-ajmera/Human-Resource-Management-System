<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f7fa;
    padding:20px;
}

nav{
    background:#2c3e50;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#3498db;
}

.parent{
    display:flex;
    gap:20px;
}

.left_div{
    flex:1;
}

h1{
    color:#c0392b;
    margin:15px 0;
}

h2,h3{
    margin-bottom:15px;
}



table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

table th,
table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

thead{
    background:#34495e;
    color:white;
}

tbody tr:nth-child(even){
    background:#f8f9fa;
}

tbody tr:hover{
    background:#eef4ff;
}

@media(max-width:768px){
    .parent{
        flex-direction:column;
    }

    table{
        font-size:14px;
    }
}

</style>


<nav>
	<ul>
		<li>company logo</li>
		<li><a href='/employees'> employees</a></li>
		<li><a href='/attendance'> attendence </a></li>
		<li><a href='/time off'> time off </a></li>
		<li><a href='/profile'> profile </a></li>
	</ul>
</nav>
<div>
<h2>employees details</h2>




</div>
<div class="parant">
<div class="left_div">
	<h3> view mode </h3>
<table border="1" >
	<thead>
		<tr>
			<td> employee name</td>
			<td> email </td>
			<td>last name</td>
            <td>status</td>

		</tr>
	</thead>
	<tbody>

	{% if empls_data %}
		
        	{% for employee in empls_data %}
		<tr>  
			<td>{{ employee['f_name'] }}</td>
			<td>{{ employee['email'] }}</td>
			<td>{{ employee['l_name'] }}</td>
		</tr>
	{%endfor%}
	
	{% endif %}
	</tbody>

</table>
</div>
</div>
